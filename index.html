    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        corp: { black: '#000000', dark: '#0a0a0a', panel: '#111111', border: '#1f1f1f', text: '#a1a1aa' }
                    }
                }

   /* ============================================================
   AI ENGINE — All AI features (Categorization, Health, Fraud, Voice, etc.)
   ============================================================ */
const AIEngine = {
    /* --- Smart Expense Categorization --- */
    categoryMap: {
        'Food & Dining': ['restaurant','food','lunch','dinner','breakfast','coffee','cafe','pizza','burger','grocery','groceries','supermarket','meal','snack','bakery','catering','takeout','uber eats','doordash'],
        'Transport': ['uber','lyft','taxi','cab','fuel','gas','petrol','diesel','bus','train','metro','subway','parking','toll','flight','airline','ticket','car','auto','rickshaw','oil change'],
        'Utilities': ['electric','electricity','water','gas bill','internet','wifi','phone','mobile','broadband','utility','utilities','rent','maintenance','repair'],
        'Shopping': ['amazon','ebay','walmart','store','shop','clothing','shoes','electronics','furniture','appliance','purchase','buy','order','delivery'],
        'Healthcare': ['doctor','hospital','pharmacy','medicine','medical','health','dental','clinic','insurance','vision','eye','therapy','lab'],
        'Entertainment': ['movie','netflix','spotify','game','gaming','concert','ticket','show','theater','subscription','hobby','sport','gym','fitness'],
        'Business': ['office','software','hosting','domain','advertising','marketing','legal','accounting','consultant','freelance','service','license','tool','saas'],
        'Travel': ['hotel','flight','airbnb','booking','vacation','trip','resort','travel','luggage','visa'],
        'Other': []
    },

    categorizeExpense(name, amount) {
        if (!name) return 'Other';
        const lower = name.toLowerCase();
        for (const [cat, keywords] of Object.entries(this.categoryMap)) {
            if (cat === 'Other') continue;
            for (const kw of keywords) { if (lower.includes(kw)) return cat; }
        }
        if (parseFloat(amount) > 500) return 'Business';
        if (parseFloat(amount) < 10) return 'Food & Dining';
        return 'Other';
    },

    /* --- Financial Health Score (0-100) --- */
    calculateHealthScore() {
        const inc = App.db.income.reduce((s,i)=>s+parseFloat(i.amount||0),0);
        const exp = App.db.expenses.reduce((s,e)=>s+parseFloat(e.amount||0),0);
        const sal = App.db.salaries.reduce((s,r)=>s+parseFloat(r.amount||0),0);
        const sav = App.db.savings.reduce((s,r)=>s+(r.type==='Deposit'?parseFloat(r.amount||0):-parseFloat(r.amount||0)),0);
        const totalExp = exp + sal;
        const net = inc - totalExp;

        if (inc === 0 && totalExp === 0) return { score: 50, label: 'No Data', color: '#71717a' };

        let score = 0;
        score += Math.min(30, Math.max(0, (inc > 0 ? (net / inc) * 100 : 0) * 0.6)); // Savings rate
        score += Math.min(25, Math.max(0, (1 - (inc > 0 ? totalExp / inc : 1)) * 25)); // Expense ratio
        score += Math.min(20, (totalExp > 0 ? sav / (totalExp / 12) : 0) * 4); // Emergency fund
        score += Math.min(15, new Set(App.db.income.map(i=>i.source||i.category)).size * 2); // Income diversity
        
        score = Math.round(Math.min(100, Math.max(0, score)));
        let label, color;
        if (score >= 80) { label = 'Excellent'; color = '#22c55e'; }
        else if (score >= 60) { label = 'Good'; color = '#3b82f6'; }
        else if (score >= 40) { label = 'Fair'; color = '#f59e0b'; }
        else { label = 'Poor'; color = '#ef4444'; }
        return { score, label, color };
    },

    /* --- Spending Pattern Analysis --- */
    analyzeSpendingPatterns() {
        const byCategory = {}, byMonth = {};
        App.db.expenses.forEach(e => {
            const cat = e.category || 'Uncategorized';
            const amt = parseFloat(e.amount || 0);
            byCategory[cat] = (byCategory[cat]||0) + amt;
            if (e.date) {
                const d = new Date(e.date);
                const mk = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
                byMonth[mk] = (byMonth[mk]||0) + amt;
            }
        });
        return { 
            byCategory: Object.entries(byCategory).sort((a,b)=>b[1]-a[1]), 
            monthlyTrend: Object.entries(byMonth).sort((a,b)=>a[0].localeCompare(b[0])),
            totalExpenses: App.db.expenses.reduce((s,e)=>s+parseFloat(e.amount||0),0) 
        };
    },

    /* --- Savings Recommendations --- */
    generateSavingsRecommendations() {
        const recs = [];
        const patterns = this.analyzeSpendingPatterns();
        const inc = App.db.income.reduce((s,i)=>s+parseFloat(i.amount||0),0);
        const totalExp = patterns.totalExpenses;
        const savingsRate = inc > 0 ? ((inc-totalExp)/inc)*100 : 0;

        if (patterns.byCategory.length > 0) {
            const top = patterns.byCategory[0];
            const pct = totalExp > 0 ? ((top[1]/totalExp)*100).toFixed(0) : 0;
            if (pct > 30) recs.push({ title:`High ${top[0]} Spending`, desc:`${top[0]} accounts for ${pct}% of expenses. Consider setting a budget limit.`, impact: 'high' });
        }
        if (savingsRate < 20) recs.push({ title:'Increase Savings Rate', desc:`Your savings rate is ${savingsRate.toFixed(1)}%. Aim for at least 20%.`, impact:'high' });
        else recs.push({ title:'Strong Savings Habits', desc:`You're saving ${savingsRate.toFixed(1)}% of income. Consider investing surplus.`, impact:'low' });

        if (recs.length === 0) recs.push({ title:'Looking Good', desc:'Your spending patterns are well-balanced.', impact:'low' });
        return recs;
    },

    /* --- Future Balance Prediction --- */
    predictFutureBalance(monthsAhead = 3) {
        const monthlyData = this._getMonthlyData();
        if (monthlyData.length < 2) return { predictions: [], trend: 'insufficient-data' };
        const n = monthlyData.length;
        const xs = monthlyData.map((_,i)=>i);
        const ys = monthlyData.map(m=>m.net);
        const sumX = xs.reduce((a,b)=>a+b,0);
        const sumY = ys.reduce((a,b)=>a+b,0);
        const sumXY = xs.reduce((a,x,i)=>a+x*ys[i],0);
        const sumXX = xs.reduce((a,x)=>a+x*x,0);
        const slope = (n*sumXY - sumX*sumY)/(n*sumXX - sumX*sumX);
        const intercept = (sumY - slope*sumX)/n;
        const predictions = [];
        const lastMonth = monthlyData[monthlyData.length-1].month;
        for (let i = 1; i <= monthsAhead; i++) {
            const predNet = slope*(n-1+i)+intercept;
            const d = new Date(lastMonth+'-01'); d.setMonth(d.getMonth()+i);
            predictions.push({ month: d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'), predicted: Math.round(predNet) });
        }
        return { predictions, trend: slope > 50 ? 'growing' : slope < -50 ? 'declining' : 'stable' };
    },

    /* --- Fraud & Duplicate Detection --- */
    detectFraud() {
        const alerts = [];
        const expenses = App.db.expenses;
        const amounts = expenses.map(e=>parseFloat(e.amount||0)).filter(a=>a>0);
        if (amounts.length === 0) return alerts;
        const mean = amounts.reduce((a,b)=>a+b,0)/amounts.length;
        const std = Math.sqrt(amounts.reduce((s,a)=>s+(a-mean)**2,0)/amounts.length);

        expenses.forEach(e => {
            const amt = parseFloat(e.amount||0);
            if (amt > mean + 2.5*std && amt > 100) alerts.push({ type:'unusual-amount', desc:`Unusual amount: ${App.formatCurrency(amt)} on ${App.formatDate(e.date)}` });
        });

        const seen = {};
        expenses.forEach(e => {
            const key = `${e.amount}_${e.date}`;
            if (seen[key]) alerts.push({ type:'duplicate', desc:`Possible duplicate: ${App.formatCurrency(e.amount)} on ${App.formatDate(e.date)}` });
            else seen[key] = e;
        });
        return alerts;
    },

    /* --- Monthly AI Summary --- */
    generateMonthlySummaries() {
        const monthlyData = this._getMonthlyData();
        return monthlyData.slice(-6).reverse().map(m => {
            const trend = m.net > 0 ? 'positive' : 'negative';
            const insight = m.net > 0 ? `Net income of ${App.formatCurrency(m.net)}.` : `Net loss of ${App.formatCurrency(Math.abs(m.net))}. Review spending.`;
            return { month: m.month, income: m.income, expenses: m.expenses, net: m.net, trend, insight };
        });
    },

    /* --- Budget Planning Assistant --- */
    generateBudgetPlan() {
        const inc = App.db.income.reduce((s,i)=>s+parseFloat(i.amount||0),0);
        return { 
            total5030_20: { needs: inc*0.5, wants: inc*0.3, savings: inc*0.2 }, 
            totalIncome: inc 
        };
    },

    /* --- Helper: Monthly aggregation --- */
    _getMonthlyData() {
        const months = {};
        App.db.income.forEach(i => { if(i.date){ const d=new Date(i.date); const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); if(!months[k])months[k]={month:k,income:0,expenses:0,net:0}; months[k].income+=parseFloat(i.amount||0); months[k].net+=parseFloat(i.amount||0); }});
        App.db.expenses.forEach(e => { if(e.date){ const d=new Date(e.date); const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); if(!months[k])months[k]={month:k,income:0,expenses:0,net:0}; months[k].expenses+=parseFloat(e.amount||0); months[k].net-=parseFloat(e.amount||0); }});
        App.db.salaries.forEach(s => { if(s.date){ const d=new Date(s.date); const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); if(!months[k])months[k]={month:k,income:0,expenses:0,net:0}; months[k].expenses+=parseFloat(s.amount||0); months[k].net-=parseFloat(s.amount||0); }});
        return Object.values(months).sort((a,b)=>a.month.localeCompare(b.month));
    }
};

/* ============================================================
   VOICE ENGINE — Web Speech API for Transaction Entry
   ============================================================ */
const VoiceEngine = {
    recognition: null,
    isListening: false,
    _callback: null,

    init() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return false;
        this.recognition = new SR();
        this.recognition.continuous = false;
        this.recognition.interimResults = false;
        this.recognition.lang = 'en-US';
        this.recognition.onresult = (e) => {
            const transcript = e.results[0][0].transcript;
            this.isListening = false;
            Toast.success(`Heard: "${transcript}"`);
            if (this._callback) this._callback(transcript);
        };
        this.recognition.onerror = () => { this.isListening = false; Toast.error('Voice recognition failed.'); };
        this.recognition.onend = () => { this.isListening = false; };
        return true;
    },

    start(callback) {
        if (!this.recognition && !this.init()) { Toast.warning('Voice recognition not supported in this browser.'); return; }
        if (this.isListening) { this.stop(); return; }
        this._callback = callback;
        this.isListening = true;
        this.recognition.start();
        Toast.info('Listening... Speak now');
    },

    stop() { if(this.recognition && this.isListening) { this.recognition.stop(); this.isListening = false; } },

    parseTransaction(text) {
        const lower = text.toLowerCase();
        let amount = 0, type = 'expense', name = text, category = '';
        const amtMatch = text.match(/(\$?[\d,]+\.?\d*)/);
        if (amtMatch) amount = parseFloat(amtMatch[1].replace(/[$,]/g, ''));
        if (lower.match(/\b(earned|received|income|salary|got paid)\b/)) type = 'income';
        else if (lower.match(/\b(spent|paid|bought|purchased|cost)\b/)) type = 'expense';
        name = text.replace(/(\$?[\d,]+\.?\d*)/g, '').replace(/\b(spent|paid|bought|purchased|cost|earned|received|income|for|on|the|a|an)\b/gi, '').trim();
        if (!name) name = 'Voice Entry';
        category = AIEngine.categorizeExpense(name, amount);
        return { amount, type, name, category, date: new Date().toISOString().split('T')[0] };
    }
};

// Initialize Voice Engine
VoiceEngine.init();

<script>
/* ============================================================
   CONFIGURATION
   ============================================================ */
const CONFIG = {
    API_URL: 'https://script.google.com/macros/s/AKfycbwv9FYBZotIM_g-weHLabBGp9a5uDjd_xV4WJyb9IPqO0_-eBYkAqCzqJUSMVIiSeBAEQ/exec',
    CACHE_TTL: 5 * 60 * 1000,
    MAX_RETRIES: 3,
    PAGE_SIZE: 15,
    RETRY_DELAYS: [1000, 2500, 5000],
    DEBOUNCE_MS: 300,
    TOAST_DURATION: 3500,
    TOAST_MAX: 5
};

/* ============================================================
   CACHE MANAGER
   ============================================================ */
const Cache = {
    _store: new Map(),

    get(key) {
        const entry = this._store.get(key);
        if (entry && Date.now() - entry.ts < CONFIG.CACHE_TTL) return entry.data;
        if (entry) this._store.delete(key);
        try {
            const raw = localStorage.getItem('_tc_' + key);
            if (raw) {
                const parsed = JSON.parse(raw);
                if (Date.now() - parsed.ts < CONFIG.CACHE_TTL) {
                    this._store.set(key, parsed);
                    return parsed.data;
                }
                localStorage.removeItem('_tc_' + key);
            }
        } catch(e) {}
        return null;
    },

    set(key, data) {
        const entry = { data, ts: Date.now() };
        this._store.set(key, entry);
        try { localStorage.setItem('_tc_' + key, JSON.stringify(entry)); } catch(e) {}
    },

    invalidate(key) {
        this._store.delete(key);
        try { localStorage.removeItem('_tc_' + key); } catch(e) {}
    },

    invalidateAll() {
        this._store.clear();
        try {
            Object.keys(localStorage).filter(k => k.startsWith('_tc_')).forEach(k => localStorage.removeItem(k));
        } catch(e) {}
    }
};

/* ============================================================
   REQUEST MANAGER
   ============================================================ */
const API = {
    _pending: new Map(),

    async request(table, action, payload = null, id = null) {
        const dedupeKey = action === 'read' ? `read_${table}` : `${table}_${action}_${id || Date.now()}`;
        if (action === 'read' && this._pending.has(dedupeKey)) return this._pending.get(dedupeKey);
        const promise = this._executeWithRetry(table, action, payload, id);
        if (action === 'read') this._pending.set(dedupeKey, promise);
        try { return await promise; } finally { this._pending.delete(dedupeKey); }
    },

    async _executeWithRetry(table, action, payload, id, attempt = 0) {
        try {
            let url = `${CONFIG.API_URL}?action=${action}&table=${table}`;
            if (id) url += `&id=${id}`;
            const options = { method: action === 'read' ? 'GET' : 'POST', redirect: 'follow' };
            if (payload) {
                options.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
                options.body = JSON.stringify(payload);
            }
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 15000);
            options.signal = controller.signal;
            const res = await fetch(url, options);
            clearTimeout(timeout);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (action === 'read') Cache.set(table, data.data || []);
            return data.data || [];
        } catch (err) {
            if (attempt < CONFIG.MAX_RETRIES - 1 && (err.name === 'AbortError' || err.name === 'TypeError' || err.message.includes('HTTP'))) {
                const delay = CONFIG.RETRY_DELAYS[attempt] || 5000;
                Toast.warning(`Retrying ${table}... (${attempt + 1}/${CONFIG.MAX_RETRIES})`);
                await new Promise(r => setTimeout(r, delay));
                return this._executeWithRetry(table, action, payload, id, attempt + 1);
            }
            console.error(`API Error [${table}/${action}]:`, err);
            if (action !== 'read') Toast.error(`Failed to save ${table}. Please try again.`);
            return action === 'read' ? (Cache.get(table) || []) : [];
        }
    },

    async writeInBackground(table, action, payload, id = null) {
        try {
            const result = await this.request(table, action, payload, id);
            Cache.invalidate(table);
            return result;
        } catch (err) {
            console.error('Background write failed:', err);
            return null;
        }
    }
};

/* ============================================================
   TOAST SYSTEM
   ============================================================ */
const Toast = {
    show(message, type = 'info', duration = CONFIG.TOAST_DURATION) {
        const container = document.getElementById('toast-container');
        while (container.children.length >= CONFIG.TOAST_MAX) container.removeChild(container.firstChild);
        const colors = {
            success: 'border-green-500/30 bg-green-950/80 text-green-300',
            error: 'border-red-500/30 bg-red-950/80 text-red-300',
            warning: 'border-yellow-500/30 bg-yellow-950/80 text-yellow-300',
            info: 'border-purple-500/30 bg-purple-950/80 text-purple-300'
        };
        const icons = {
            success: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>',
            error: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>',
            warning: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>',
            info: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'
        };
        const el = document.createElement('div');
        el.className = `toast-in pointer-events-auto flex items-start gap-3 px-4 py-3 rounded border backdrop-blur-sm ${colors[type] || colors.info}`;
        el.innerHTML = `<svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">${icons[type] || icons.info}</svg><p class="text-xs flex-1">${message}</p><button class="shrink-0 opacity-60 hover:opacity-100" onclick="this.parentElement.remove()">&times;</button>`;
        container.appendChild(el);
        setTimeout(() => { el.classList.replace('toast-in', 'toast-out'); el.addEventListener('animationend', () => el.remove()); }, duration);
    },
    success(msg) { this.show(msg, 'success'); },
    error(msg) { this.show(msg, 'error', 5000); },
    warning(msg) { this.show(msg, 'warning'); },
    info(msg) { this.show(msg, 'info', 2500); }
};

/* ============================================================
   CONFIRM DIALOG
   ============================================================ */
const Confirm = {
    _resolve: null,
    show(title, message) {
        return new Promise(resolve => {
            this._resolve = resolve;
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-msg').textContent = message;

    }
};

/* ============================================================
   UTILITY
   ============================================================ */
function debounce(fn, ms) {
    let timer;
    return function(...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), ms); };
}

/* ============================================================
   FORM VALIDATOR
   ============================================================ */
const Validator = {
    rules: {
        required: (v) => (v && v.toString().trim() !== '') || 'This field is required',
        positive: (v) => (parseFloat(v) > 0) || 'Must be a positive number',
        maxLength: (max) => (v) => (v && v.length <= max) || `Max ${max} characters`
    },
    validate(formEl) {
        let valid = true;
        formEl.querySelectorAll('[data-validate]').forEach(field => {
            const rules = field.dataset.validate.split('|');
            const errorEl = field.parentElement.querySelector('.field-error-msg');
            let fieldValid = true, errorMsg = '';
            for (const rule of rules) {
                const [name, param] = rule.split(':');
                const result = name === 'maxLength'
                    ? this.rules.maxLength(parseInt(param))(field.value)
                    : this.rules[name]?.(field.value);
                if (result !== true) { errorMsg = result; fieldValid = false; break; }
            }
            if (!fieldValid) {
                field.classList.add('field-error');
                if (errorEl) { errorEl.textContent = errorMsg; errorEl.style.display = 'block'; }
                valid = false;
            } else {
                field.classList.remove('field-error');
                if (errorEl) errorEl.style.display = 'none';
            }
        });
        return valid;
    }
};

/* ============================================================
   PAGINATION
   ============================================================ */
const Paginator = {
    _states: {},
    getState(key, totalItems) {
        if (!this._states[key] || this._states[key].total !== totalItems) {
            this._states[key] = { page: 1, total: totalItems };
        }
        this._states[key].total = totalItems;
        return this._states[key];
    },
    paginate(data, page, pageSize) {
        const start = (page - 1) * pageSize;
        return data.slice(start, start + pageSize);
    },
    render(key, totalItems, currentPage) {
        const totalPages = Math.max(1, Math.ceil(totalItems / CONFIG.PAGE_SIZE));
        if (totalPages <= 1) return '';
        let pages = [];
        if (totalPages <= 7) { for (let i = 1; i <= totalPages; i++) pages.push(i); }
        else {
            pages.push(1);
            if (currentPage > 3) pages.push('...');
            for (let i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) pages.push(i);
            if (currentPage < totalPages - 2) pages.push('...');
            pages.push(totalPages);
        }
        return `<div class="flex items-center justify-between mt-4 pt-4 border-t border-corp-border">
            <span class="text-xs text-corp-text">${totalItems} records</span>
            <div class="flex gap-1">
                <button data-pg="${key}" data-pn="${currentPage - 1}" class="px-2 py-1 text-xs rounded border border-corp-border text-corp-text hover:text-white disabled:opacity-30 disabled:pointer-events-none" ${currentPage <= 1 ? 'disabled' : ''}>&laquo;</button>
                ${pages.map(p => p === '...' ? `<span class="px-2 py-1 text-xs text-corp-text">...</span>` : `<button data-pg="${key}" data-pn="${p}" class="px-2 py-1 text-xs rounded border ${p === currentPage ? 'bg-purple-600 border-purple-600 text-white' : 'border-corp-border text-corp-text hover:text-white'}">${p}</button>`).join('')}
                <button data-pg="${key}" data-pn="${currentPage + 1}" class="px-2 py-1 text-xs rounded border border-corp-border text-corp-text hover:text-white disabled:opacity-30 disabled:pointer-events-none" ${currentPage >= totalPages ? 'disabled' : ''}>&raquo;</button>
            </div>
        </div>`;
    },
    handle(e, callback) {
        const btn = e.target.closest('[data-pg]');
        if (btn) { const page = parseInt(btn.dataset.pn); if (page >= 1) callback(btn.dataset.pg, page); }
    }
};

    /* ========== Optimistic save ========== */
    async saveRecord(tableKey, action, payload, id = null, activityMsg = '') {
        if (this._saving) { Toast.warning('Please wait, another save is in progress.'); return; }
        this._saving = true;
        const tableName = tableKey.charAt(0).toUpperCase() + tableKey.slice(1);
        const collection = this.db[tableKey];

        // Optimistic local update
        if (action === 'create') { collection.unshift(payload); }
        else if (action === 'update' && id) { const idx = collection.findIndex(r => r.id === id); if (idx >= 0) collection[idx] = { ...collection[idx], ...payload }; }
        else if (action === 'delete' && id) { const idx = collection.findIndex(r => r.id === id); if (idx >= 0) collection.splice(idx, 1); }

        this.refreshPage();
        Toast.info('Saving...');

        try {
            await API.writeInBackground(tableName, action, payload, id);
            Cache.invalidate(tableName);
            if (activityMsg) {
                const actPayload = { id: 'act_' + Date.now(), desc: activityMsg, time: new Date().toISOString() };
                this.db.activities.unshift(actPayload);
                API.writeInBackground('Activities', 'create', actPayload);
            }
            Toast.success('Saved successfully');
        } catch (err) {
            Toast.error('Save failed. Reverting...');
            await this.loadTable(tableKey);
            this.refreshPage();
        } finally { this._saving = false; }

        window.addEventListener('hashchange', () => { const page = window.location.hash.slice(1); if (page && page !== this._currentPage) this.navigate(page); });
        document.getElementById('global-search').addEventListener('input', debounce((e) => { this._searchQuery = e.target.value.trim().toLowerCase(); this.refreshPage(); }, CONFIG.DEBOUNCE_MS));
        document.getElementById('page-content').addEventListener('click', (e) => { Paginator.handle(e, (key, page) => { Paginator._states[key].page = page; this.refreshPage(); }); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { this.closeModal(); document.getElementById('confirm-overlay').classList.add('hidden'); } });
    }
};

        document.querySelectorAll('[data-del-fin]').forEach(btn => btn.addEventListener('click', async (e) => {
            const confirmed = await Confirm.show('Delete Record', 'Are you sure you want to delete this record?');
            if (confirmed) await App.saveRecord(type, 'delete', null, e.target.dataset.delFin, `Deleted ${title} record`);
        }));
    },

    income: {
        render() { return Pages._finPage('income', 'Income', ['Client Payments', 'Donations', 'Sponsorships', 'Investments', 'Other Revenue']); },
        init() { Pages._finInit('income', 'source', 'Income', ['Client Payments', 'Donations', 'Sponsorships', 'Investments', 'Other Revenue']); }
    },

    expenses: {
        render() { return Pages._finPage('expenses', 'Expenses', ['Salaries', 'Software', 'Marketing', 'Equipment', 'Office', 'Miscellaneous']); },
        init() { Pages._finInit('expenses', 'name', 'Expenses', ['Salaries', 'Software', 'Marketing', 'Equipment', 'Office', 'Miscellaneous']); }
    },

    savings: {
        render() {
            const q = App._searchQuery;
            let data = App.db.savings;
            if (q) data = data.filter(s => (s.type || '').toLowerCase().includes(q) || (s.desc || '').toLowerCase().includes(q));
            const balance = data.reduce((s, r) => s + (r.type === 'Deposit' ? parseFloat(r.amount || 0) : -parseFloat(r.amount || 0)), 0);
            const state = Paginator.getState('savings', data.length);
            const pageData = Paginator.paginate(data, state.page, CONFIG.PAGE_SIZE);
            return `<div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-6">
                <h2 class="text-xl font-bold text-white">Company Savings</h2>
                <div class="flex gap-2"><button id="add-deposit" class="btn-press bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded text-xs font-semibold transition-colors no-select">Deposit</button><button id="add-withdraw" class="btn-press bg-corp-panel border border-corp-border hover:bg-corp-black px-4 py-2 rounded text-xs font-semibold transition-colors no-select">Withdraw</button></div>
            </div>
            <div class="bg-corp-panel border border-corp-border p-4 rounded mb-6"><p class="text-xs text-corp-text uppercase">Total Savings Balance</p><p class="text-xl font-bold text-purple-400 mt-1">${App.formatCurrency(balance)}</p></div>
            <div class="bg-corp-panel border border-corp-border rounded overflow-x-auto"><table class="w-full text-xs text-left"><thead class="bg-corp-black text-corp-text uppercase"><tr><th class="p-3">Type</th><th class="p-3">Amount</th><th class="p-3">Date</th><th class="p-3">Description</th><th class="p-3">Action</th></tr></thead><tbody>${pageData.map(i => `<tr class="border-b border-corp-border hover:bg-corp-black/50"><td class="p-3 ${i.type === 'Deposit' ? 'text-green-400' : 'text-red-400'}">${i.type}</td><td class="p-3 text-white">${App.formatCurrency(i.amount)}</td><td class="p-3 text-corp-text">${App.formatDate(i.date)}</td><td class="p-3 text-corp-text">${i.desc || 'N/A'}</td><td class="p-3"><button data-del-sav="${i.id}" class="text-red-400 hover:text-red-300 text-[10px]">Delete</button></td></tr>`).join('')}${!pageData.length ? '<tr><td colspan="5" class="p-3 text-corp-text text-center">No records</td></tr>' : ''}</tbody></table></div>${Paginator.render('savings', data.length, state.page)}`;
        },
        init() {
            const formHtml = (type) => `<form id="sav-form" class="space-y-4" novalidate>
                <input type="hidden" id="sv-type" value="${type}">
                <div><label class="text-[10px] text-corp-text uppercase">Amount</label><input type="number" step="0.01" id="sv-amount" data-validate="required|positive" class="w-full mt-1 p-2 bg-corp-black border border-corp-border rounded text-xs text-white outline-none focus:ring-1 focus:ring-purple-500"><p class="field-error-msg"></p></div>
                <div><label class="text-[10px] text-corp-text uppercase">Date</label><input type="date" id="sv-date" data-validate="required" class="w-full mt-1 p-2 bg-corp-black border border-corp-border rounded text-xs text-white outline-none focus:ring-1 focus:ring-purple-500"><p class="field-error-msg"></p></div>
                <div><label class="text-[10px] text-corp-text uppercase">Description</label><input id="sv-desc" class="w-full mt-1 p-2 bg-corp-black border border-corp-border rounded text-xs text-white outline-none focus:ring-1 focus:ring-purple-500"></div>
                <button type="submit" id="sav-submit-btn" class="btn-press w-full bg-purple-600 hover:bg-purple-700 py-2 rounded text-xs font-semibold transition-colors no-select">Save</button></form>`;
            document.getElementById('add-deposit')?.addEventListener('click', () => { App.openModal('Deposit Savings', formHtml('Deposit')); this._bindForm(); });
            document.getElementById('add-withdraw')?.addEventListener('click', () => { App.openModal('Withdraw Savings', formHtml('Withdraw')); this._bindForm(); });
            document.querySelectorAll('[data-del-sav]').forEach(btn => btn.addEventListener('click', async (e) => {
                const confirmed = await Confirm.show('Delete Savings Record', 'Are you sure you want to delete this savings record?');
                if (confirmed) await App.saveRecord('savings', 'delete', null, e.target.dataset.delSav, 'Deleted savings record');
            }));
        },
        _bindForm() {
            document.getElementById('sav-form').addEventListener('submit', async (e) => {
                e.preventDefault(); if (!Validator.validate(e.target)) { Toast.error('Please fix the errors'); return; } if (App._saving) return;
                const btn = document.getElementById('sav-submit-btn'); btn.disabled = true; btn.innerHTML = '<span class="spinner mr-2"></span>Saving...';
                const payload = { id: 'sav_' + Date.now(), type: document.getElementById('sv-type').value, amount: document.getElementById('sv-amount').value, date: document.getElementById('sv-date').value, desc: document.getElementById('sv-desc').value.trim() };
                try { await App.saveRecord('savings', 'create', payload, null, `Recorded ${payload.type} in savings`); App.closeModal(); }
                finally { btn.disabled = false; btn.textContent = 'Save'; }
            });
        }
    },

    reports: {
        render() {
            const q = App._searchQuery;
            let activities = App.db.activities;
            if (q) activities = activities.filter(a => (a.desc || '').toLowerCase().includes(q));
            return `<h2 class="text-xl font-bold text-white mb-6">Reports & Export</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-corp-panel border border-corp-border p-6 rounded"><h3 class="text-sm font-semibold mb-4 text-white">Generate & Export Reports</h3><div class="space-y-2">
                        <button data-report="income" class="btn-press w-full text-left px-4 py-3 bg-corp-black border border-corp-border rounded hover:border-purple-500 transition-colors text-xs text-corp-text hover:text-white no-select">Income Report</button>
                        <button data-report="expenses" class="btn-press w-full text-left px-4 py-3 bg-corp-black border border-corp-border rounded hover:border-purple-500 transition-colors text-xs text-corp-text hover:text-white no-select">Expenses Report</button>
                        <button data-report="salaries" class="btn-press w-full text-left px-4 py-3 bg-corp-black border border-corp-border rounded hover:border-purple-500 transition-colors text-xs text-corp-text hover:text-white no-select">Salary Report</button>
                        <button data-report="savings" class="btn-press w-full text-left px-4 py-3 bg-corp-black border border-corp-border rounded hover:border-purple-500 transition-colors text-xs text-corp-text hover:text-white no-select">Savings Report</button>
                    </div></div>
                    <div class="bg-corp-panel border border-corp-border p-6 rounded"><h3 class="text-sm font-semibold mb-4 text-white">Activity Log</h3><div class="space-y-2 max-h-80 overflow-y-auto pr-2">
                        ${activities.length ? activities.slice(0, 50).map(a => `<div class="text-[11px] border-b border-corp-border pb-2"><span class="text-zinc-600">${a.time ? new Date(a.time).toLocaleString() : ''}</span><br><span class="text-corp-text">${a.desc || ''}</span></div>`).join('') : '<p class="text-corp-text text-xs">No activities recorded.</p>'}
                    </div></div>
                </div>`;
        },
        init() {
            document.querySelectorAll('[data-report]').forEach(btn => btn.addEventListener('click', (e) => this._generate(e.target.dataset.report)));
        },
        _generate(type) {
            const data = App.db[type];
            const config = {
                income: { title: 'Income Report', headers: ['Source', 'Category', 'Amount', 'Date'], fields: ['source', 'category', 'amount', 'date'] },
                expenses: { title: 'Expenses Report', headers: ['Name', 'Category', 'Amount', 'Date'], fields: ['name', 'category', 'amount', 'date'] },
                salaries: { title: 'Salary Report', headers: ['Employee', 'Amount', 'Date', 'Status'], fields: ['name', 'amount', 'date', 'status'] },
                savings: { title: 'Savings Report', headers: ['Type', 'Amount', 'Date', 'Description'], fields: ['type', 'amount', 'date', 'desc'] }
            };
            const cfg = config[type]; if (!cfg) return;
            if (!data.length) { Toast.warning(`No ${type} data to export.`); return; }
            App.openModal(`Export ${cfg.title}`, `<div class="space-y-4"><p class="text-xs text-corp-text">Exporting ${data.length} records from ${cfg.title}.</p><div class="grid grid-cols-3 gap-2">
                <button id="exp-pdf" class="btn-press bg-purple-600 hover:bg-purple-700 py-2 rounded text-xs font-semibold transition-colors no-select">PDF</button>
                <button id="exp-xlsx" class="btn-press bg-corp-black border border-corp-border hover:border-purple-500 py-2 rounded text-xs font-semibold transition-colors text-white no-select">Excel</button>
                <button id="exp-csv" class="btn-press bg-corp-black border border-corp-border hover:border-purple-500 py-2 rounded text-xs font-semibold transition-colors text-white no-select">CSV</button>
            </div></div>`);
            document.getElementById('exp-pdf').addEventListener('click', () => this._exportPDF(cfg, data));
            document.getElementById('exp-xlsx').addEventListener('click', () => this._exportXLSX(cfg, data));
            document.getElementById('exp-csv').addEventListener('click', () => this._exportCSV(cfg, data));
        },
        _exportPDF(cfg, data) {
            try {
                const { jsPDF } = window.jspdf; const doc = new jsPDF();
                doc.setFontSize(16); doc.text(cfg.title, 14, 20);
                doc.setFontSize(10); doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 28);
                doc.text(`Total Records: ${data.length}`, 14, 34);
                let y = 44; doc.setFontSize(9); doc.setFont(undefined, 'bold');
                cfg.headers.forEach((h, i) => doc.text(h, 14 + i * 42, y)); y += 6; doc.setFont(undefined, 'normal');
                data.forEach(row => {
                    if (y > 280) { doc.addPage(); y = 20; }
                    cfg.fields.forEach((f, i) => { let val = row[f] || ''; if (f === 'amount') val = App.formatCurrency(val); if (f === 'date') val = App.formatDate(val); doc.text(String(val).substring(0, 20), 14 + i * 42, y); }); y += 5;
                });
                doc.save(`${cfg.title.replace(/\s/g, '_')}_${new Date().toISOString().slice(0, 10)}.pdf`);
                Toast.success('PDF exported'); App.closeModal();
            } catch (err) { Toast.error('PDF export failed: ' + err.message); }
        },
        _exportXLSX(cfg, data) {
            try {
                const rows = data.map(row => cfg.fields.map(f => { if (f === 'amount') return parseFloat(row[f]) || 0; return row[f] || ''; }));
                const ws = XLSX.utils.aoa_to_sheet([cfg.headers, ...rows]);
                const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Report');
                XLSX.writeFile(wb, `${cfg.title.replace(/\s/g, '_')}_${new Date().toISOString().slice(0, 10)}.xlsx`);
                Toast.success('Excel exported'); App.closeModal();
            } catch (err) { Toast.error('Excel export failed: ' + err.message); }
        },
        _exportCSV(cfg, data) {
            try {
                const header = cfg.headers.join(',');
                const rows = data.map(row => cfg.fields.map(f => { let val = row[f] || ''; if (f === 'amount') val = parseFloat(row[f]) || 0; return `"${String(val).replace(/"/g, '""')}"`; }).join(','));
                const csv = [header, ...rows].join('\n');
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `${cfg.title.replace(/\s/g, '_')}_${new Date().toISOString().slice(0, 10)}.csv`; a.click(); URL.revokeObjectURL(url);
                Toast.success('CSV exported'); App.closeModal();
            } catch (err) { Toast.error('CSV export failed: ' + err.message); }
        }
    }
};

/* ============================================================
   INIT
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => App.init());
    
</script>
</body>
</html>
