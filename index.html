<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TyPixel Support Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        corp: { black: '#000000', dark: '#0a0a0a', panel: '#111111', border: '#1f1f1f', text: '#a1a1aa' }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        /* === Toast Animations === */
        @keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
        .toast-in { animation: toastIn 0.3s ease-out forwards; }
        .toast-out { animation: toastOut 0.3s ease-in forwards; }

        /* === Skeleton Pulse === */
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton {
            background: linear-gradient(90deg, #111111 25%, #1a1a1a 50%, #111111 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: 4px;
        }

        /* === Button Press Feedback === */
        .btn-press { transition: transform 0.1s ease, box-shadow 0.1s ease; }
        .btn-press:active { transform: scale(0.97); }

        /* === Page Transition === */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .page-enter { animation: fadeUp 0.25s ease-out forwards; }

        /* === Loading Spinner === */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { width: 16px; height: 16px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; vertical-align: middle; }

        /* === Overlay === */
        .overlay-loading {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: none; align-items: center; justify-content: center; z-index: 200;
        }
        .overlay-loading.is-visible { display: flex !important; }

        /* === Form Validation === */
        .field-error { border-color: #ef4444 !important; }
        .field-error-msg { color: #ef4444; font-size: 10px; margin-top: 2px; display: none; }

        /* === Prevent double-click text selection === */
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="bg-corp-black text-white font-sans h-screen overflow-hidden flex items-center justify-center">

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-[300] flex flex-col gap-2 pointer-events-none" style="max-width:360px;"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="overlay-loading">
        <div class="spinner" style="width:32px;height:32px;border-width:3px;border-top-color:#9333ea;"></div>
    </div>

    <!-- Login Screen -->

        <div class="text-center">
            <h1 class="text-2xl font-bold tracking-tight text-white">TyPixel</h1>
            <p class="text-xs text-corp-text mt-1 uppercase tracking-widest">Support Center</p>
        </div>

            <div>
                <label class="text-xs font-medium text-corp-text uppercase tracking-wider">Username</label>

            </div>
            <div class="relative">
                <label class="text-xs font-medium text-corp-text uppercase tracking-wider">Password</label>
                <input type="password" id="login-pass" class="mt-1 w-full px-3 py-2 bg-corp-black border border-corp-border rounded text-sm text-white focus:outline-none focus:ring-1 focus:ring-purple-500 focus:border-purple-500" required autocomplete="current-password">
                <button type="button" id="toggle-pass" class="absolute right-3 top-9 text-xs text-corp-text hover:text-white">SHOW</button>
            </div>
            <div class="flex items-center justify-between">
                <label class="flex items-center text-xs text-corp-text"><input type="checkbox" id="remember-me" class="mr-2 rounded bg-corp-black border-corp-border text-purple-600 focus:ring-purple-500">Remember me</label>
                <a href="#" onclick="Toast.info('Contact Admin to reset password')" class="text-xs text-purple-500 hover:text-purple-400">Forgot Password?</a>
            </div>
            <button type="submit" id="login-btn" class="btn-press w-full py-2 px-4 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded transition-colors no-select">Sign In</button>

    <!-- App Shell -->
    <div id="app-view" class="hidden w-full h-full flex">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-corp-panel border-r border-corp-border flex flex-col h-full transition-transform duration-200 md:translate-x-0 -translate-x-full fixed md:relative z-50">
            <div class="h-16 flex items-center px-6 border-b border-corp-border shrink-0">
                <span class="text-lg font-bold text-white tracking-tight">TyPixel <span class="text-purple-500">.</span></span>
            </div>
            <nav class="flex-1 overflow-y-auto py-4" id="nav-links"></nav>
            <div class="p-4 border-t border-corp-border">
                <button id="logout-btn" class="btn-press w-full text-left px-4 py-2 text-xs text-corp-text hover:text-white hover:bg-corp-black rounded transition-colors flex items-center gap-3 no-select">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Logout
                </button>
            </div>
        </aside>
        <!-- Sidebar Backdrop (mobile) -->
        <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black/50 z-40 md:hidden"></div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col h-full overflow-hidden bg-corp-black">
            <header class="h-16 bg-corp-panel border-b border-corp-border flex items-center justify-between px-6 shrink-0">
                <button id="menu-toggle" class="md:hidden text-corp-text hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="flex-1 md:flex-none md:max-w-xs px-4">
                    <input type="text" id="global-search" placeholder="Search records..." class="w-full bg-corp-black border border-corp-border rounded py-1.5 px-3 text-xs text-white focus:outline-none focus:ring-1 focus:ring-purple-500">
                </div>
                <div class="relative">
                    <button id="notif-btn" class="text-corp-text hover:text-white relative">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                        <span id="notif-badge" class="absolute top-0 right-0 w-2 h-2 bg-purple-600 rounded-full hidden"></span>
                    </button>
                    <div id="notif-dropdown" class="hidden absolute right-0 mt-2 w-72 bg-corp-panel border border-corp-border rounded shadow-xl py-2 max-h-64 overflow-y-auto z-50"></div>
                </div>

    <!-- Modal -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
        <div class="bg-corp-panel w-full max-w-lg rounded border border-corp-border shadow-2xl flex flex-col max-h-[90vh]">
            <div class="flex items-center justify-between p-4 border-b border-corp-border">

    <!-- Confirm Dialog -->

        <div class="bg-corp-panel w-full max-w-sm rounded border border-corp-border shadow-2xl p-6 text-center">
            <svg class="w-10 h-10 mx-auto text-red-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"></path></svg>
            <h4 id="confirm-title" class="text-white font-semibold mb-2"></h4>
            <p id="confirm-msg" class="text-corp-text text-xs mb-5"></p>
            <div class="flex gap-3 justify-center">
                <button id="confirm-cancel" class="btn-press px-5 py-2 bg-corp-black border border-corp-border rounded text-xs font-semibold text-corp-text hover:text-white transition-colors no-select">Cancel</button>
                <button id="confirm-ok" class="btn-press px-5 py-2 bg-red-600 hover:bg-red-700 rounded text-xs font-semibold text-white transition-colors no-select">Delete</button>
            </div>
        </div>
    </div>

<script>
/* ============================================================
   CONFIGURATION
   ============================================================ */
const CONFIG = {
    API_URL: 'https://script.google.com/macros/s/AKfycbwv9FYBZotIM_g-weHLabBGp9a5uDjd_xV4WJyb9IPqO0_-eBYkAqCzqJUSMVIiSeBAEQ/exec',
    CACHE_TTL: 5 * 60 * 1000,
    MAX_RETRIES: 3,
    PAGE_SIZE: 15,
    RETRY_DELAYS: [1000, 2500, 5000],
    DEBOUNCE_MS: 300,
    TOAST_DURATION: 3500,
    TOAST_MAX: 5
};

/* ============================================================
   CACHE MANAGER
   ============================================================ */
const Cache = {
    _store: new Map(),
    get(key) {
        const entry = this._store.get(key);
        if (entry && Date.now() - entry.ts < CONFIG.CACHE_TTL) return entry.data;
        if (entry) this._store.delete(key);
        try {
            const raw = localStorage.getItem('_tc_' + key);
            if (raw) {
                const parsed = JSON.parse(raw);
                if (Date.now() - parsed.ts < CONFIG.CACHE_TTL) {
                    this._store.set(key, parsed);
                    return parsed.data;
                }
                localStorage.removeItem('_tc_' + key);
            }
        } catch(e) {}
        return null;
    },
    set(key, data) {
        const entry = { data, ts: Date.now() };
        this._store.set(key, entry);
        try { localStorage.setItem('_tc_' + key, JSON.stringify(entry)); } catch(e) {}
    },
    invalidate(key) {
        this._store.delete(key);
        try { localStorage.removeItem('_tc_' + key); } catch(e) {}
    },
    invalidateAll() {
        this._store.clear();
        try { Object.keys(localStorage).filter(k => k.startsWith('_tc_')).forEach(k => localStorage.removeItem(k)); } catch(e) {}
    }
};

/* ============================================================
   REQUEST MANAGER
   ============================================================ */
const API = {
    _pending: new Map(),
    async request(table, action, payload = null, id = null) {
        const dedupeKey = action === 'read' ? `read_${table}` : `${table}_${action}_${id || Date.now()}`;
        if (action === 'read' && this._pending.has(dedupeKey)) return this._pending.get(dedupeKey);
        const promise = this._executeWithRetry(table, action, payload, id);
        if (action === 'read') this._pending.set(dedupeKey, promise);
        try { return await promise; } finally { this._pending.delete(dedupeKey); }
    },
    async _executeWithRetry(table, action, payload, id, attempt = 0) {
        try {
            let url = `${CONFIG.API_URL}?action=${action}&table=${table}`;
            if (id) url += `&id=${id}`;
            const options = { method: action === 'read' ? 'GET' : 'POST', redirect: 'follow' };
            if (payload) {
                options.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
                options.body = JSON.stringify(payload);
            }
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 15000);
            options.signal = controller.signal;
            const res = await fetch(url, options);
            clearTimeout(timeout);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (action === 'read') Cache.set(table, data.data || []);
            return data.data || [];
        } catch (err) {
            if (attempt < CONFIG.MAX_RETRIES - 1 && (err.name === 'AbortError' || err.name === 'TypeError' || err.message.includes('HTTP'))) {
                const delay = CONFIG.RETRY_DELAYS[attempt] || 5000;
                Toast.warning(`Retrying ${table}... (${attempt + 1}/${CONFIG.MAX_RETRIES})`);
                await new Promise(r => setTimeout(r, delay));
                return this._executeWithRetry(table, action, payload, id, attempt + 1);
            }
            console.error(`API Error [${table}/${action}]:`, err);
            if (action !== 'read') Toast.error(`Failed to save ${table}. Please try again.`);
            return action === 'read' ? (Cache.get(table) || []) : [];
        }
    },
    async writeInBackground(table, action, payload, id = null) {
        try {
            const result = await this.request(table, action, payload, id);
            Cache.invalidate(table);
            return result;
        } catch (err) {
            console.error('Background write failed:', err);
            return null;
        }
    }
};

/* ============================================================
   TOAST SYSTEM
   ============================================================ */
const Toast = {
    show(message, type = 'info', duration = CONFIG.TOAST_DURATION) {
        const container = document.getElementById('toast-container');
        while (container.children.length >= CONFIG.TOAST_MAX) container.removeChild(container.firstChild);
        const colors = {
            success: 'border-green-500/30 bg-green-950/80 text-green-300',
            error: 'border-red-500/30 bg-red-950/80 text-red-300',
            warning: 'border-yellow-500/30 bg-yellow-950/80 text-yellow-300',
            info: 'border-purple-500/30 bg-purple-950/80 text-purple-300'
        };
        const icons = {
            success: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>',
            error: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>',
            warning: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>',
            info: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'
        };
        const el = document.createElement('div');
        el.className = `toast-in pointer-events-auto flex items-start gap-3 px-4 py-3 rounded border backdrop-blur-sm ${colors[type] || colors.info}`;
        el.innerHTML = `<svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">${icons[type] || icons.info}</svg><p class="text-xs flex-1">${message}</p><button class="shrink-0 opacity-60 hover:opacity-100" onclick="this.parentElement.remove()">&times;</button>`;
        container.appendChild(el);
        setTimeout(() => { el.classList.replace('toast-in', 'toast-out'); el.addEventListener('animationend', () => el.remove()); }, duration);
    },
    success(msg) { this.show(msg, 'success'); },
    error(msg) { this.show(msg, 'error', 5000); },
    warning(msg) { this.show(msg, 'warning'); },
    info(msg) { this.show(msg, 'info', 2500); }
};

/* ============================================================
   CONFIRM DIALOG
   ============================================================ */
const Confirm = {
    _resolve: null,
    show(title, message) {
        return new Promise(resolve => {
            this._resolve = resolve;
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-msg').textContent = message;
            document.getElementById('confirm-overlay').classList.remove('hidden');
        });
    },
    _handle(result) {
        document.getElementById('confirm-overlay').classList.add('hidden');
        if (this._resolve) { this._resolve(result); this._resolve = null; }
    }
};

/* ============================================================
   UTILITY
   ============================================================ */
function debounce(fn, ms) {
    let timer;
    return function(...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), ms); };
}

/* ============================================================
   FORM VALIDATOR
   ============================================================ */
const Validator = {
    rules: {
        required: (v) => (v && v.toString().trim() !== '') || 'This field is required',
        positive: (v) => (parseFloat(v) > 0) || 'Must be a positive number',
        maxLength: (max) => (v) => (v && v.length <= max) || `Max ${max} characters`
    },
    validate(formEl) {
        let valid = true;
        formEl.querySelectorAll('[data-validate]').forEach(field => {
            const rules = field.dataset.validate.split('|');
            const errorEl = field.parentElement.querySelector('.field-error-msg');
            let fieldValid = true, errorMsg = '';
            for (const rule of rules) {
                const [name, param] = rule.split(':');
                const result = name === 'maxLength'
                    ? this.rules.maxLength(parseInt(param))(field.value)
                    : this.rules[name]?.(field.value);
                if (result !== true) { errorMsg = result; fieldValid = false; break; }
            }
            if (!fieldValid) {
                field.classList.add('field-error');
                if (errorEl) { errorEl.textContent = errorMsg; errorEl.style.display = 'block'; }
                valid = false;
            } else {
                field.classList.remove('field-error');
                if (errorEl) errorEl.style.display = 'none';
            }
        });
        return valid;
    }
};

/* ============================================================
   PAGINATION
   ============================================================ */
const Paginator = {
    _states: {},
    getState(key, totalItems) {
        if (!this._states[key] || this._states[key].total !== totalItems) {
            this._states[key] = { page: 1, total: totalItems };
        }
        this._states[key].total = totalItems;
        return this._states[key];
    },
    paginate(data, page, pageSize) {
        const start = (page - 1) * pageSize;
        return data.slice(start, start + pageSize);
    },
    render(key, totalItems, currentPage) {
        const totalPages = Math.max(1, Math.ceil(totalItems / CONFIG.PAGE_SIZE));
        if (totalPages <= 1) return '';
        let pages = [];
        if (totalPages <= 7) { for (let i = 1; i <= totalPages; i++) pages.push(i); }
        else {
            pages.push(1);
            if (currentPage > 3) pages.push('...');
            for (let i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) pages.push(i);
            if (currentPage < totalPages - 2) pages.push('...');
            pages.push(totalPages);
        }
        return `<div class="flex items-center justify-between mt-4 pt-4 border-t border-corp-border">
            <span class="text-xs text-corp-text">${totalItems} records</span>
            <div class="flex gap-1">
                <button data-pg="${key}" data-pn="${currentPage - 1}" class="px-2 py-1 text-xs rounded border border-corp-border text-corp-text hover:text-white disabled:opacity-30 disabled:pointer-events-none" ${currentPage <= 1 ? 'disabled' : ''}>&laquo;</button>
                ${pages.map(p => p === '...' ? `<span class="px-2 py-1 text-xs text-corp-text">...</span>` : `<button data-pg="${key}" data-pn="${p}" class="px-2 py-1 text-xs rounded border ${p === currentPage ? 'bg-purple-600 border-purple-600 text-white' : 'border-corp-border text-corp-text hover:text-white'}">${p}</button>`).join('')}
                <button data-pg="${key}" data-pn="${currentPage + 1}" class="px-2 py-1 text-xs rounded border border-corp-border text-corp-text hover:text-white disabled:opacity-30 disabled:pointer-events-none" ${currentPage >= totalPages ? 'disabled' : ''}>&raquo;</button>
            </div>
        </div>`;
    },
    handle(e, callback) {
        const btn = e.target.closest('[data-pg]');
        if (btn) { const page = parseInt(btn.dataset.pn); if (page >= 1) callback(btn.dataset.pg, page); }
    }
};

/* ============================================================
   LOADING OVERLAY HELPER
   ============================================================ */
const Loading = {
    show() { document.getElementById('loading-overlay').classList.add('is-visible'); },
    hide() { document.getElementById('loading-overlay').classList.remove('is-visible'); }
};

/* ============================================================
   MAIN APPLICATION
   ============================================================ */
const App = {
    user: null,
    // UPDATED: Currency changed to '₹' here
    db: { users: [], members: [], salaries: [], income: [], expenses: [], savings: [], activities: [], notifications: [], settings: { companyName: 'TyPixel', currency: '₹' } },
    _currentPage: 'dashboard',
    _saving: false,
    _searchQuery: '',

    init() { this.bindEvents(); this.checkSession(); },

    async apiCall(table, action, payload = null, id = null) { return API.request(table, action, payload, id); },

    async loadDb(forceRefresh = false) {
        if (forceRefresh) Cache.invalidateAll();
        // UPDATED: Added 'Users' to the list of tables to fetch
        const tables = ['Users', 'Members', 'Salaries', 'Income', 'Expenses', 'Savings', 'Activities', 'Notifications'];
        const keys = ['users', 'members', 'salaries', 'income', 'expenses', 'savings', 'activities', 'notifications'];
        const toFetch = [], toFetchKeys = [];
        for (let i = 0; i < tables.length; i++) {
            const cached = Cache.get(tables[i]);
            if (cached && !forceRefresh) { this.db[keys[i]] = cached; }
            else { toFetch.push(tables[i]); toFetchKeys.push(keys[i]); }
        }
        if (toFetch.length > 0) {
            const results = await Promise.all(toFetch.map(t => this.apiCall(t, 'read')));
            toFetchKeys.forEach((key, i) => { this.db[key] = results[i] || []; });
        }
    },

    async loadTable(tableKey) {
        const tableNames = { users: 'Users', members: 'Members', salaries: 'Salaries', income: 'Income', expenses: 'Expenses', savings: 'Savings', activities: 'Activities', notifications: 'Notifications' };
        const tableName = tableNames[tableKey];
        if (!tableName) return;
        Cache.invalidate(tableName);
        this.db[tableKey] = await this.apiCall(tableName, 'read');
    },

    checkSession() {
        const session = localStorage.getItem('typixel_session') || sessionStorage.getItem('typixel_session');
        if (session === 'active') { this.user = localStorage.getItem('typixel_user') || 'admin'; this.showApp(); }
        else { this.showLogin(); }
    },

    showLogin() {
        document.getElementById('login-view').classList.remove('hidden');
        document.getElementById('app-view').classList.add('hidden');
        Loading.hide();
    },

    async login(username, password, remember) {
        const btn = document.getElementById('login-btn');
        const errorEl = document.getElementById('login-error');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner mr-2"></span>Signing In...';
        errorEl.classList.add('hidden');

        try {
            const users = await this.apiCall('Users', 'read');
            if (!users || users.length === 0) {
                // Fallback for first run if Users table is empty in DB
                if (username === 'admin' && password === 'admin') {
                    this.user = 'admin';
                } else {
                    errorEl.textContent = "No users configured in database yet.";
                    errorEl.classList.remove('hidden');
                    return false;
                }
            } else {
                const user = users.find(u => u.username === username && u.password === password);
                if (user) {
                    this.user = username;
                } else {
                    errorEl.textContent = "Invalid credentials.";
                    errorEl.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                    return false;
                }
            }
            
            if (remember) {
                localStorage.setItem('typixel_session', 'active');
                localStorage.setItem('typixel_user', this.user);
            } else {
                sessionStorage.setItem('typixel_session', 'active');
            }
            this.showApp();
            return true;
        } catch (err) {
            errorEl.textContent = "Connection error. Check script URL.";
            errorEl.classList.remove('hidden');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
        return false;
    },

    logout() {
        Cache.invalidateAll();
        localStorage.removeItem('typixel_session');
        sessionStorage.removeItem('typixel_session');
        localStorage.removeItem('typixel_user');
        this.user = null;
        this.showLogin();
    },

    async showApp() {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('app-view').classList.remove('hidden');
        this.setupNav();
        document.getElementById('page-content').innerHTML = this._skeleton();
        Loading.show();
        try { await this.loadDb(); } catch(e) { Toast.error('Failed to load data.'); }
        Loading.hide();
        this.navigate(window.location.hash.slice(1) || 'dashboard');
        this.checkNotifications();
    },

    _skeleton() {
        return `<div class="page-enter space-y-6">
            <div class="skeleton h-8 w-48"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                ${Array(4).fill('<div class="skeleton h-24"></div>').join('')}
            </div>
            <div class="skeleton h-48"></div>
        </div>`;
    },

    navigate(page) {
        this._currentPage = page;
        this._searchQuery = '';
        const searchInput = document.getElementById('global-search');
        if (searchInput) searchInput.value = '';
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('sidebar-backdrop').classList.add('hidden');
        window.location.hash = page;
        const content = document.getElementById('page-content');
        if (Pages[page]) {
            content.innerHTML = `<div class="page-enter">${Pages[page].render()}</div>`;
            if (Pages[page].init) Pages[page].init();
        } else {
            content.innerHTML = `<div class="page-enter">${Pages.dashboard.render()}</div>`;
            Pages.dashboard.init();
        }
        document.querySelectorAll('.nav-link').forEach(link => {
            const isActive = link.dataset.page === page;
            link.classList.toggle('bg-purple-600/10', isActive);
            link.classList.toggle('text-purple-400', isActive);
        });
    },

    refreshPage() {
        const page = this._currentPage;
        if (Pages[page]) {
            const content = document.getElementById('page-content');
            const scrollTop = content.scrollTop;
            content.innerHTML = `<div class="page-enter">${Pages[page].render()}</div>`;
            if (Pages[page].init) Pages[page].init();
            content.scrollTop = scrollTop;
        }
    },

            { id: 'members', label: 'Members', icon: 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z' },
            { id: 'salary', label: 'Salary', icon: 'M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' },
            { id: 'income', label: 'Income', icon: 'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z' },

            { id: 'savings', label: 'Savings', icon: 'M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z' },
            { id: 'reports', label: 'Reports', icon: 'M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z' },
            { id: 'users', label: 'Users', icon: 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z' },
            { id: 'settings', label: 'Settings', icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z' }

                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${item.icon}"></path></svg> ${item.label}
            </a>
        `).join('');
    },

    async saveRecord(tableKey, action, payload, id = null, activityMsg = '') {
        if (this._saving) { Toast.warning('Please wait, another save is in progress.'); return; }
        this._saving = true;
        const tableName = tableKey.charAt(0).toUpperCase() + tableKey.slice(1);
        const collection = this.db[tableKey];

        if (action === 'create') { collection.unshift(payload); }
        else if (action === 'update' && id) { const idx = collection.findIndex(r => r.id === id); if (idx >= 0) collection[idx] = { ...collection[idx], ...payload }; }
        else if (action === 'delete' && id) { const idx = collection.findIndex(r => r.id === id); if (idx >= 0) collection.splice(idx, 1); }

        this.refreshPage();
        Toast.info('Saving...');

        try {
            await API.writeInBackground(tableName, action, payload, id);
            Cache.invalidate(tableName);
            if (activityMsg) {
                const actPayload = { id: 'act_' + Date.now(), desc: activityMsg, time: new Date().toISOString() };
                this.db.activities.unshift(actPayload);
                API.writeInBackground('Activities', 'create', actPayload);
            }
            Toast.success('Saved successfully');
        } catch (err) {
            Toast.error('Save failed. Reverting...');
            await this.loadTable(tableKey);
            this.refreshPage();
        } finally { this._saving = false; }
    },

    formatCurrency(amount) { return `${this.db.settings.currency}${parseFloat(amount || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 })}`; },
    formatDate(dateStr) {
        if (!dateStr) return 'N/A';
        try { const d = new Date(dateStr); return isNaN(d) ? 'N/A' : d.toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' }); }
        catch(e) { return 'N/A'; }
    },

    checkNotifications() {
        const unread = this.db.notifications.filter(n => n.read === 'false' || n.read === false).length;
        const badge = document.getElementById('notif-badge');
        const dropdown = document.getElementById('notif-dropdown');
        if (unread > 0) {
            badge.classList.remove('hidden');
            dropdown.innerHTML = this.db.notifications.slice(0, 10).map(n => `
                <div class="px-4 py-2 hover:bg-corp-black border-b border-corp-border ${n.read === 'false' || n.read === false ? 'text-white' : 'text-corp-text'}">
                    <p class="text-xs">${n.desc || ''}</p>
                    <p class="text-[10px] text-zinc-600 mt-1">${this.formatDate(n.time)}</p>
                </div>
            `).join('');
        } else {
            badge.classList.add('hidden');
            dropdown.innerHTML = '<p class="px-4 py-2 text-xs text-corp-text">No new notifications</p>';
        }
    },

    openModal(title, bodyHtml) {
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-body').innerHTML = bodyHtml;
        document.getElementById('modal-overlay').classList.remove('hidden');
    },
    closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); },

    bindEvents() {
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            this.login(document.getElementById('login-user').value.trim(), document.getElementById('login-pass').value, document.getElementById('remember-me').checked);
        });
        document.getElementById('toggle-pass').addEventListener('click', (e) => {
            const input = document.getElementById('login-pass');
            input.type = input.type === 'password' ? 'text' : 'password';
            e.target.textContent = input.type === 'password' ? 'SHOW' : 'HIDE';
        });
        document.getElementById('logout-btn').addEventListener('click', () => this.logout());
        document.getElementById('menu-toggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('-translate-x-full');
            document.getElementById('sidebar-backdrop').classList.remove('hidden');
        });
        document.getElementById('sidebar-backdrop').addEventListener('click', () => {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebar-backdrop').classList.add('hidden');
        });
        document.getElementById('modal-close').addEventListener('click', () => this.closeModal());
        document.getElementById('modal-overlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) this.closeModal(); });
        document.getElementById('confirm-cancel').addEventListener('click', () => Confirm._handle(false));
        document.getElementById('confirm-ok').addEventListener('click', () => Confirm._handle(true));
        document.getElementById('notif-btn').addEventListener('click', () => {
            const dd = document.getElementById('notif-dropdown');
            dd.classList.toggle('hidden');
            if (!dd.classList.contains('hidden')) {
                let changed = false;
                this.db.notifications.forEach(n => { if (n.read === 'false' || n.read === false) { n.read = 'true'; changed = true; API.writeInBackground('Notifications', 'update', n, n.id); } });
                if (changed) setTimeout(() => this.checkNotifications(), 500);
            }
        });
        document.addEventListener('click', (e) => { if (!e.target.closest('#notif-btn') && !e.target.closest('#notif-dropdown')) document.getElementById('notif-dropdown').classList.add('hidden'); });
        document.getElementById('nav-links').addEventListener('click', (e) => { const link = e.target.closest('.nav-link'); if (link) this.navigate(link.dataset.page); });
        window.addEventListener('hashchange', () => { const page = window.location.hash.slice(1); if (page && page !== this._currentPage) this.navigate(page); });
        document.getElementById('global-search').addEventListener('input', debounce((e) => { this._searchQuery = e.target.value.trim().toLowerCase(); this.refreshPage(); }, CONFIG.DEBOUNCE_MS));
        document.getElementById('page-content').addEventListener('click', (e) => { Paginator.handle(e, (key, page) => { Paginator._states[key].page = page; this.refreshPage(); }); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { this.closeModal(); document.getElementById('confirm-overlay').classList.add('hidden'); } });
    }
};

const Pages = {
    dashboard: {
        render() {
            const inc = App.db.income, exp = App.db.expenses, sal = App.db.salaries, sav = App.db.savings, q = App._searchQuery;
            const totalIncome = inc.reduce((s, i) => s + parseFloat(i.amount || 0), 0);
            const totalExpenses = exp.reduce((s, e) => s + parseFloat(e.amount || 0), 0);
            const totalSalaries = sal.reduce((s, r) => s + parseFloat(r.amount || 0), 0);
            const totalSavings = sav.reduce((s, r) => s + (r.type === 'Deposit' ? parseFloat(r.amount || 0) : -parseFloat(r.amount || 0)), 0);
            const netProfit = totalIncome - totalExpenses - totalSalaries;
            let health = { text: '', color: '' };
            if (totalIncome === 0 && totalExpenses === 0) health = { text: 'No financial data yet.', color: 'text-zinc-500' };
            else if (netProfit > totalIncome * 0.3) health = { text: 'Income growth is strong and expenses remain controlled. Financial health is excellent.', color: 'text-green-400' };
            else if (netProfit > 0) health = { text: 'Revenue and expenses are balanced. Business performance remains stable.', color: 'text-blue-400' };
            else if (netProfit === 0) health = { text: 'Income covers expenses, but profit margins should improve.', color: 'text-yellow-400' };
            else if (netProfit < 0 && totalIncome > 0) health = { text: 'Expenses are rising faster than income. Spending should be reviewed.', color: 'text-orange-400' };
            else health = { text: 'Expenses exceed income. Immediate financial adjustments are recommended.', color: 'text-red-400' };
            const card = (label, value, color = 'text-white', icon = '') => `<div class="bg-corp-panel border border-corp-border p-4 rounded hover:border-corp-text/20 transition-colors"><p class="text-xs text-corp-text uppercase tracking-wider flex items-center gap-2">${icon}${label}</p><p class="text-xl font-bold ${color} mt-1">${value}</p></div>`;
            const filteredIncome = q ? inc.filter(i => (i.source || '').toLowerCase().includes(q) || (i.category || '').toLowerCase().includes(q)) : inc;
            const filteredExpenses = q ? exp.filter(i => (i.name || '').toLowerCase().includes(q) || (i.category || '').toLowerCase().includes(q)) : exp;
            return `<h2 class="text-xl font-bold text-white mb-6">Dashboard Overview</h2>
                <div class="bg-corp-panel border border-corp-border p-4 rounded mb-8"><h3 class="text-xs font-medium text-corp-text uppercase tracking-wider mb-2">Financial Health Analysis</h3><p class="text-sm font-medium ${health.color}">${health.text}</p></div>

                    ${card('Total Expenses', App.formatCurrency(totalExpenses + totalSalaries), 'text-red-400', '<svg class="w-3.5 h-3.5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"/></svg>')}
                    ${card('Net Profit', App.formatCurrency(netProfit), netProfit >= 0 ? 'text-green-400' : 'text-red-400')}
                    ${card('Company Savings', App.formatCurrency(totalSavings), 'text-purple-400')}
                    ${card('Total Salary Paid', App.formatCurrency(totalSalaries))}
                </div>
                ${q ? `<p class="text-xs text-corp-text mb-4">Showing results for "${App._searchQuery}"</p>` : ''}
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-corp-panel border border-corp-border p-4 rounded"><h3 class="text-sm font-semibold mb-4 text-white">Recent Income</h3>${this._miniTable(filteredIncome.slice(0, 5), ['source', 'amount', 'date'])}</div>

                        <div><label class="text-[10px] text-corp-text uppercase">Department</label><input id="m-dept" value="${m?.department || ''}" data-validate="required" class="w-full mt-1 p-2 bg-corp-black border border-corp-border rounded text-xs text-white outline-none focus:ring-1 focus:ring-purple-500"><p class="field-error-msg"></p></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] text-corp-text uppercase">Salary</label><input type="number" id="m-sal" value="${m?.salary || ''}" data-validate="required|positive" class="w-full mt-1 p-2 bg-corp-black border border-corp-border rounded text-xs text-white outline-none focus:ring-1 focus:ring-purple-500"><p class="field-error-msg"></p></div>
                        <div><label class="text-[10px] text-corp-text uppercase">Status</label><select id="m-status" class="w-full mt-1 p-2 bg-corp-black border border-corp-border rounded text-xs text-white outline-none focus:ring-1 focus:ring-purple-500"><option value="Active" ${m?.status==='Active'?'selected':''}>Active</option><option value="Inactive" ${m?.status==='Inactive'?'selected':''}>Inactive</option></select></div>
                    </div>
                    <button type="submit" class="btn-press w-full py-2 bg-purple-600 hover:bg-purple-700 rounded text-xs font-semibold text-white no-select">Save Member</button>
                </form>
            `);
            document.getElementById('m-photo').addEventListener('change', function() {
                if(this.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (e) => { document.getElementById('photo-preview').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`; document.getElementById('m-photo-data').value = e.target.result; };
                    reader.readAsDataURL(this.files[0]);
                }
            });
            document.getElementById('member-form').addEventListener('submit', (e) => {
                e.preventDefault();
                if(!Validator.validate(e.target)) return;
                const payload = {
                    id: document.getElementById('m-id').value || 'mem_' + Date.now(),
                    name: document.getElementById('m-name').value,
                    empId: document.getElementById('m-empid').value,
                    position: document.getElementById('m-pos').value,
                    department: document.getElementById('m-dept').value,
                    salary: parseFloat(document.getElementById('m-sal').value),
                    status: document.getElementById('m-status').value,
                    photo: document.getElementById('m-photo-data').value
                };
                App.saveRecord('members', payload.id.startsWith('mem_') ? 'create' : 'update', payload, payload.id.startsWith('mem_') ? null : payload.id, `Member saved: ${payload.name}`);
                App.closeModal();
            });
        }
    },
    
    // Additional Standard Pages (Placeholder logic)
    salary: { render: () => `<h2 class="text-xl font-bold text-white mb-4">Salary Records</h2><p class="text-corp-text text-xs">Manage salary payouts here.</p>`, init: () => {} },
    income: { render: () => `<h2 class="text-xl font-bold text-white mb-4">Income Sources</h2><p class="text-corp-text text-xs">Manage income entries here.</p>`, init: () => {} },
    expenses: { render: () => `<h2 class="text-xl font-bold text-white mb-4">Expenses</h2><p class="text-corp-text text-xs">Manage expense entries here.</p>`, init: () => {} },
    savings: { render: () => `<h2 class="text-xl font-bold text-white mb-4">Savings</h2><p class="text-corp-text text-xs">Manage savings goals here.</p>`, init: () => {} },
    reports: { render: () => `<h2 class="text-xl font-bold text-white mb-4">Reports</h2><p class="text-corp-text text-xs">Generate financial reports here.</p>`, init: () => {} },

    // ============================================================
    // FEATURE: User Management (Admin)
    // ============================================================
    users: {
        render() {
            const users = App.db.users || [];
            return `<div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-6">
                <h2 class="text-xl font-bold text-white">System Users</h2>
                <button id="add-user-btn" class="btn-press bg-green-600 hover:bg-green-700 px-4 py-2 rounded text-xs font-semibold transition-colors no-select">Add New User</button>
            </div>
            <div class="bg-corp-panel border border-corp-border rounded overflow-hidden">
                <table class="w-full text-xs text-left">
                    <thead class="bg-corp-black text-corp-text uppercase font-medium"><tr><th class="p-3">Username</th><th class="p-3">Role</th><th class="p-3 text-right">Actions</th></tr></thead>
                    <tbody class="divide-y divide-corp-border">
                        ${users.length === 0 ? '<tr><td colspan="3" class="p-4 text-center text-corp-text">No users found. Login initially with "admin/admin".</td></tr>' : 
                          users.map(u => `
                            <tr class="hover:bg-corp-black/50">
                                <td class="p-3 text-white font-medium">${u.username}</td>
                                <td class="p-3 text-corp-text">${u.role || 'User'}</td>
                                <td class="p-3 text-right">
                                    ${u.username !== 'admin' ? `<button data-del-user="${u.id}" class="text-red-400 hover:text-red-300">Delete</button>` : '<span class="text-zinc-700 text-[10px]">Locked</span>'}
                                </td>
                            </tr>
                          `).join('')}
                    </tbody>
                </table>
            </div>`;
        },
        init() {
            document.getElementById('add-user-btn')?.addEventListener('click', () => this.showAddForm());
            document.querySelectorAll('[data-del-user]').forEach(btn => btn.addEventListener('click', (e) => this.deleteUser(e.target.dataset.delUser)));
        },
        showAddForm() {
            App.openModal('Add New User', `
                <form id="user-form" class="space-y-4" novalidate>
                    <div>
                        <label class="text-[10px] text-corp-text uppercase">Username</label>
                        <input id="u-name" type="text" data-validate="required" class="w-full mt-1 p-2 bg-corp-black border border-corp-border rounded text-xs text-white focus:ring-1 focus:ring-purple-500">
                        <p class="field-error-msg"></p>
                    </div>
                    <div>
                        <label class="text-[10px] text-corp-text uppercase">Password</label>
                        <input id="u-pass" type="password" data-validate="required" class="w-full mt-1 p-2 bg-corp-black border border-corp-border rounded text-xs text-white focus:ring-1 focus:ring-purple-500">
                        <p class="field-error-msg"></p>
                    </div>
                    <div>
                        <label class="text-[10px] text-corp-text uppercase">Role</label>
                        <select id="u-role" class="w-full mt-1 p-2 bg-corp-black border border-corp-border rounded text-xs text-white focus:ring-1 focus:ring-purple-500">
                            <option value="User">User</option>
                            <option value="Admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-press w-full py-2 bg-green-600 hover:bg-green-700 rounded text-xs font-semibold text-white no-select">Create User</button>
                </form>
            `);
            document.getElementById('user-form').addEventListener('submit', (e) => {
                e.preventDefault();
                if(!Validator.validate(e.target)) return;
                
                // Check duplicate
                if(App.db.users.find(u => u.username === document.getElementById('u-name').value)) {
                    Toast.error('Username already exists');
                    return;
                }

                const payload = {
                    id: 'usr_' + Date.now(),
                    username: document.getElementById('u-name').value,
                    password: document.getElementById('u-pass').value,
                    role: document.getElementById('u-role').value
                };
                App.saveRecord('users', 'create', payload, null, `New user created: ${payload.username}`);
                App.closeModal();
            });
        },
        async deleteUser(id) {
            const u = App.db.users.find(x => x.id === id);
            const confirmed = await Confirm.show('Delete User', `Are you sure you want to delete user "${u.username}"?`);
            if (confirmed) {
                App.saveRecord('users', 'delete', null, id, `User deleted: ${u.username}`);
            }
        }
    },

    // ============================================================
    // FEATURE: Settings (Change Password)
    // ============================================================
    settings: {
        render() {
            return `<div class="max-w-xl">
                <h2 class="text-xl font-bold text-white mb-6">Account Settings</h2>
                <div class="bg-corp-panel border border-corp-border p-6 rounded space-y-6">
                    <div>
                        <h3 class="text-sm font-semibold text-white mb-4">Change Password</h3>
                        <form id="pass-form" class="space-y-4" novalidate>
                            <div>
                                <label class="text-[10px] text-corp-text uppercase">Current Password</label>
                                <input type="password" id="p-current" data-validate="required" class="w-full mt-1 p-2 bg-corp-black border border-corp-border rounded text-xs text-white focus:ring-1 focus:ring-purple-500">
                                <p class="field-error-msg"></p>
                            </div>
                            <div>
                                <label class="text-[10px] text-corp-text uppercase">New Password</label>
                                <input type="password" id="p-new" data-validate="required" class="w-full mt-1 p-2 bg-corp-black border border-corp-border rounded text-xs text-white focus:ring-1 focus:ring-purple-500">
                                <p class="field-error-msg"></p>
                            </div>
                            <div>
                                <label class="text-[10px] text-corp-text uppercase">Confirm New Password</label>
                                <input type="password" id="p-confirm" data-validate="required" class="w-full mt-1 p-2 bg-corp-black border border-corp-border rounded text-xs text-white focus:ring-1 focus:ring-purple-500">
                                <p class="field-error-msg"></p>
                            </div>
                            <button type="submit" class="btn-press px-6 py-2 bg-purple-600 hover:bg-purple-700 rounded text-xs font-semibold text-white no-select">Update Password</button>
                        </form>
                    </div>
                </div>
            </div>`;
        },
        init() {
            document.getElementById('pass-form').addEventListener('submit', (e) => {
                e.preventDefault();
                if(!Validator.validate(e.target)) return;

                const current = document.getElementById('p-current').value;
                const newPass = document.getElementById('p-new').value;
                const confirm = document.getElementById('p-confirm').value;

                if(newPass !== confirm) {
                    Toast.error('New passwords do not match');
                    return;
                }

                const currentUserIndex = App.db.users.findIndex(u => u.username === App.user);
                
                // If user exists in DB (e.g. wasn't a fallback login)
                if(currentUserIndex >= 0) {
                    const storedUser = App.db.users[currentUserIndex];
                    if(storedUser.password !== current) {
                        Toast.error('Current password is incorrect');
                        return;
                    }
                    
                    // Update local state
                    storedUser.password = newPass;
                    
                    // Save to backend
                    App.saveRecord('users', 'update', storedUser, storedUser.id, `Password changed for user: ${App.user}`);
                    
                    // Reset form
                    document.getElementById('pass-form').reset();
                    Toast.success('Password updated successfully');
                } else {
                     Toast.error('Cannot update password for default admin fallback. Please configure users via the Admin panel.');
                }
            });
        }
    }
};
</script>
</body>
</html>
